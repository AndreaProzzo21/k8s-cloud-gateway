<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8s Gateway - Accesso</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Override specifici per compattare la login senza toccare il CSS globale */
        .login-card {
            padding: 1.5rem !important; /* Ridotto da 2rem o superiore */
            max-width: 360px !important;
            margin: auto;
        }
        .auth-header {
            margin-bottom: 1.5rem !important;
            text-align: center;
        }
        .auth-header svg {
            margin-bottom: 0.2rem !important;
            width: 32px; height: 32px; /* Leggermente più piccolo */
        }
        .auth-header h1 {
            font-size: 1.25rem !important;
            margin-bottom: 0.1rem !important;
        }
        .auth-header p {
            font-size: 0.85rem !important;
            margin: 0;
        }
        .form-group {
            margin-bottom: 0.8rem !important;
        }
        .form-group label {
            font-size: 0.75rem !important;
            margin-bottom: 0.3rem !important;
            display: block;
        }
        input {
            padding: 0.6rem !important;
            font-size: 0.9rem !important;
        }
        #errorMessage {
            color: #e11d48;
            font-size: 0.8rem;
            text-align: center;
            border-radius: 6px;
            margin-top: 0.5rem; /* Margine ridotto */
            transition: all 0.2s ease; /* Transizione fluida */
        }
    </style>
</head>
<body class="auth-page" style="display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div class="login-card">
        <div class="auth-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="2" x2="12" y2="22"></line>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="m4.93 4.93 14.14 14.14"></path>
                <path d="m19.07 4.93-14.14 14.14"></path>
            </svg>
            <h1>K8s Cloud Gateway</h1>
            <p>Cluster Management Console</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Cluster Identifier</label>
                <input type="text" id="clusterId" placeholder="es: TESI" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Access Profile</label>
                <input type="text" id="profile" placeholder="es: admin" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Gateway Credentials</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.7rem;">
                Connect to Cluster
            </button>
        </form>
        <div id="errorMessage"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('errorMessage');
            const btn = e.target.querySelector('button');
            
            msgDiv.innerText = "";
            msgDiv.style.padding = "0";
            btn.innerText = "Connecting...";
            btn.disabled = true;

            const payload = {
                cluster_id: document.getElementById('clusterId').value,
                profile: document.getElementById('profile').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('http://localhost:8000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('k8s_jwt', data.access_token);
                    localStorage.setItem('current_cluster', payload.cluster_id);
                    localStorage.setItem('current_profile', payload.profile);
                    window.location.href = 'dashboard.html';
                } else {
                    msgDiv.innerText = data.detail || "Authentication Failed";
                    msgDiv.style.padding = "8px";
                    btn.innerText = "Connect to Cluster";
                    btn.disabled = false;
                }
            } catch (err) {
                msgDiv.innerText = "Error: Backend Unreachable";
                msgDiv.style.padding = "8px";
                btn.innerText = "Connect to Cluster";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
